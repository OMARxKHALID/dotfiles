# MPV Input Config

# Mouse
WHEEL_UP      add volume 2
WHEEL_DOWN    add volume -2
MBTN_RIGHT    script-message-to command_palette show-command-palette "Command Palette"

# Seeking
RIGHT         seek  5 exact
LEFT          seek -5 exact
UP            seek  60
DOWN          seek -60

# Subtitles
r             script-binding autosub/download_next_provider
S             script-binding autosub/sync_subtitles
z             add sub-delay -0.1
x             add sub-delay +0.1
Z             add sub-delay -1.0
X             add sub-delay +1.0

# Speed
[             multiply speed 1/1.1
]             multiply speed 1.1
{             set speed 1.0

# Stats & Screenshots
i             script-binding stats/display-stats-toggle
s             screenshot
Shift+c       screenshot video

# Scripts
Alt+b         script-binding sponsorblock/sponsorblock          # Toggle SponsorBlock
Shift+Enter   script-binding playlistmanager/showplaylist
Ctrl+Shift+P  script-message-to command_palette show-command-palette "Command Palette"

# Media Keys
XF86_AUDIO_PLAY  cycle pause
XF86_AUDIO_PAUSE cycle pause
XF86_AUDIO_NEXT  playlist-next
XF86_AUDIO_PREV  playlist-prev
XF86_AUDIO_STOP  stop
