# ModernZ Config

# Display
language=en
font="JetBrainsMono Nerd Font"
idlescreen=yes
window_top_bar=auto
showwindowed=yes
showfullscreen=yes
showonpause=no
keeponpause=yes
greenandgrumpy=no

# Behavior
hidetimeout=1500
seek_resets_hidetimeout=yes
fadeduration=200
fadein=no
minmousemove=0
bottomhover=yes
bottomhover_zone=130
osc_on_seek=no
osc_on_start=no
mouse_seek_pause=yes
force_seek_tooltip=no
vidscale=auto
scalewindowed=1.0
scalefullscreen=1.0

# Elements
show_title=yes
title=${media-title}
title_font_size=24
chapter_title_font_size=14
cache_info=no
cache_info_speed=no
cache_info_font_size=12
show_chapter_title=yes
chapter_fmt=%s
timetotal=yes
timems=no
unicodeminus=no
time_format=dynamic
time_font_size=16
tooltip_font_size=14

# Title Bar
window_title=no
window_controls=yes
windowcontrols_title=${media-title}

# Subtitles
raise_subtitles=yes
raise_subtitle_amount=125

# Buttons
jump_buttons=yes
jump_amount=10
jump_more_amount=60
jump_icon_number=yes
jump_mode=relative
jump_softrepeat=yes
chapter_skip_buttons=no
chapter_softrepeat=yes
track_nextprev_buttons=yes
volume_control=yes
volume_control_type=linear
playlist_button=yes
hide_empty_playlist_button=no
gray_empty_playlist_button=no
download_button=yes
download_path=~/Videos/mpv Downloads/
screenshot_button=yes
screenshot_flag=subtitles
ontop_button=yes
loop_button=yes
speed_button=yes
speed_button_click=1
speed_button_scroll=0.25
info_button=no
fullscreen_button=yes
loop_in_pause=yes
buttons_always_active=none
zoom_control=yes
zoom_in_max=4
zoom_out_min=-1

# Icons
playpause_size=28
midbuttons_size=24
sidebuttons_size=24

# Aesthetics
osc_color=#000000
window_title_color=#FFFFFF
window_controls_color=#FFFFFF
windowcontrols_close_hover=#F45C5B
windowcontrols_max_hover=#F8BC3A
windowcontrols_min_hover=#43CB44
title_color=#FFFFFF
cache_info_color=#FFFFFF
seekbarfg_color=#FB8C00
seekbarbg_color=#94754F
seekbar_cache_color=#918F8E
volumebar_match_seek_color=no
time_color=#FFFFFF
chapter_title_color=#FFFFFF
side_buttons_color=#FFFFFF
middle_buttons_color=#FFFFFF
playpause_color=#FFFFFF
held_element_color=#999999
hover_effect_color=#FB8C00
thumbnail_border_color=#111111
thumbnail_border_outline=#404040

# Effects
fade_alpha=130
fade_blur_strength=100
fade_transparency_strength=0
window_fade_alpha=100
window_fade_blur_strength=100
window_fade_transparency_strength=0
thumbnail_border=3
thumbnail_border_radius=3
hover_effect=size,glow,color
hover_button_size=115
button_glow_amount=5
hover_effect_for_sliders=yes

# Tooltips
tooltips_for_disabled_elements=yes
tooltip_hints=yes

# Progress Bar
seek_handle_size=0.8
seekrange=yes
seekrangealpha=150
livemarkers=yes
seekbarkeyframes=no
nibbles_top=yes
nibbles_bottom=yes
nibbles_style=triangle
automatickeyframemode=yes
automatickeyframelimit=600
persistentprogress=no
persistentprogressheight=17
persistentbuffer=no

# Layout
visibility=auto
visibility_modes=never_auto_always
tick_delay=0.03
tick_delay_follow_display_fps=no
title_height=96
title_with_chapter_height=108
chapter_title_height=91
time_codes_height=35
time_codes_centered_height=57
tooltip_height_offset=2
tooltip_left_offset=5
portrait_window_trigger=1000
hide_volume_bar_trigger=1150
notitle_osc_h_offset=25
nochapter_osc_h_offset=10
seek_hover_tooltip_h_offset=0
osc_height=132

# Mouse Controls
title_mbtn_left_command=script-binding stats/display-page-5
title_mbtn_mid_command=show-text ${path}
title_mbtn_right_command=script-message-to command_palette show-command-palette "Recent Files"; script-message-to modernz osc-hide

playlist_mbtn_left_command=script-message-to command_palette show-command-palette "Command Palette"; script-message-to modernz osc-hide
playlist_mbtn_right_command=script-message-to command_palette show-command-palette "Command Palette"; script-message-to modernz osc-hide

vol_ctrl_mbtn_left_command=no-osd cycle mute
vol_ctrl_mbtn_right_command=script-message-to command_palette show-command-palette "Audio Devices"; script-message-to modernz osc-hide
vol_ctrl_wheel_down_command=no-osd add volume -5
vol_ctrl_wheel_up_command=no-osd add volume 5

audio_track_mbtn_left_command=script-message-to command_palette show-command-palette "Audio Tracks"; script-message-to modernz osc-hide
audio_track_mbtn_mid_command=cycle audio down
audio_track_mbtn_right_command=cycle audio
audio_track_wheel_down_command=cycle audio
audio_track_wheel_up_command=cycle audio down

sub_track_mbtn_left_command=script-message-to command_palette show-command-palette "Subtitle Tracks"; script-message-to modernz osc-hide
sub_track_mbtn_mid_command=cycle sub down
sub_track_mbtn_right_command=cycle sub
sub_track_wheel_down_command=cycle sub
sub_track_wheel_up_command=cycle sub down

chapter_prev_mbtn_left_command=add chapter -1
chapter_prev_mbtn_mid_command=show-text ${chapter-list} 3000
chapter_prev_mbtn_right_command=script-message-to command_palette show-command-palette "Chapters"; script-message-to modernz osc-hide
chapter_next_mbtn_left_command=add chapter 1
chapter_next_mbtn_mid_command=show-text ${chapter-list} 3000
chapter_next_mbtn_right_command=script-message-to command_palette show-command-palette "Chapters"; script-message-to modernz osc-hide
chapter_title_mbtn_left_command=script-message-to command_palette show-command-palette "Chapters"; script-message-to modernz osc-hide
chapter_title_mbtn_right_command=show-text ${chapter-list} 3000

playlist_prev_mbtn_left_command=playlist-prev
playlist_prev_mbtn_mid_command=show-text ${playlist} 3000
playlist_prev_mbtn_right_command=script-message-to command_palette show-command-palette "Playlist"; script-message-to modernz osc-hide
playlist_next_mbtn_left_command=playlist-next
playlist_next_mbtn_mid_command=show-text ${playlist} 3000
playlist_next_mbtn_right_command=script-message-to command_palette show-command-palette "Playlist"; script-message-to modernz osc-hide

fullscreen_mbtn_left_command=cycle fullscreen
fullscreen_mbtn_right_command=cycle window-maximized
info_mbtn_left_command=script-binding stats/display-stats-toggle
