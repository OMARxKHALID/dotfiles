# MPV Config

# Core
profile=gpu-hq
vo=gpu-next
gpu-context=wayland
hwdec=vaapi
hwdec-codecs=all
vd-lavc-dr=yes
save-position-on-quit=yes
write-filename-in-watch-later-config=yes
cursor-autohide=300

# UI
osc=no
osd-bar=no
border=yes
osd-font="JetBrainsMono Nerd Font"
osd-font-size=30
osd-border-size=1

# Window
autofit=85%x85%
autofit-smaller=30%x30%
keep-open=yes
keep-open-pause=no

# Subtitles
sub-auto=fuzzy
sub-file-paths=subs:subtitles
slang=en,eng
blend-subtitles=yes
sub-ass-override=yes

# Subtitle Style
sub-font="JetBrainsMono Nerd Font"
sub-font-size=35
sub-color="#FFFFFFFF"
sub-border-color="#FF262626"
sub-border-size=2
sub-shadow-offset=1
sub-shadow-color="#33000000"
sub-spacing=0.5

# Audio
ao=pipewire
volume-max=150
alang=en,eng
af=scaletempo2=min-speed=0.25:max-speed=4

# Video Quality
scale=ewa_lanczos
dscale=mitchell
cscale=ewa_lanczos
dither-depth=auto
dither=fruit

# Cache
cache=yes
demuxer-max-bytes=200MiB
demuxer-max-back-bytes=75MiB
cache-pause=yes
cache-pause-wait=3
cache-pause-initial=yes

# Network
ytdl-format=bestvideo[height<=1080][vcodec!=av01]+bestaudio/best

# Screenshots
screenshot-format=png
screenshot-high-bit-depth=yes
screenshot-directory="~/Pictures/Screenshots/"
screenshot-template="%F-%wH.%wM.%wS"

# Profiles
[WEB-DL]
profile-desc=Optimized for WEB releases
profile-cond=string.match(p.filename, "HatSubs") ~= nil or string.match(p.filename, "SubsPlease") ~= nil or string.match(p.filename, "Erai%-raws") ~= nil
deband=yes
