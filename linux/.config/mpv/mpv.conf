# MPV Config

# Core
profile=gpu-hq
vo=gpu-next
gpu-context=wayland
hwdec=auto-safe
save-position-on-quit=yes
cursor-autohide=300

# UI
osc=no
osd-bar=no
border=yes
osd-font="JetBrainsMono Nerd Font"
osd-font-size=30
osd-border-size=1

# Subtitles
sub-auto=fuzzy
sub-file-paths=subs:subtitles
slang=en,eng
blend-subtitles=yes
sub-ass-override=force

# Subtitle Style
sub-font="JetBrainsMono Nerd Font"
sub-font-size=35
sub-color="#FFFFFFFF"
sub-border-color="#FF262626"
sub-border-size=2
sub-shadow-offset=1
sub-shadow-color="#33000000"
sub-spacing=0.5

# Audio
ao=pipewire
volume-max=150
alang=en,eng

# Cache
cache=yes
demuxer-max-bytes=400MiB
demuxer-max-back-bytes=150MiB

# Screenshots
screenshot-format=png
screenshot-high-bit-depth=yes
screenshot-directory="~/Pictures/Screenshots/"
screenshot-template="%F-%wH.%wM.%wS"

# Profiles
[WEB-DL]
profile-desc=Optimized for WEB releases
profile-cond=string.match(p.filename, "HatSubs") ~= nil or string.match(p.filename, "SubsPlease") ~= nil or string.match(p.filename, "HorribleSubs") ~= nil or string.match(p.filename, "Erai%-raws") ~= nil
deband=yes
