# Video Output
profile=gpu-hq
vo=gpu
hwdec=auto-safe      # Use hardware decoding

# Subtitles
sub-auto=fuzzy       # Load external subtitles matching the video filename
sub-file-paths=subs:subtitles  # Look for subs in these subdirectories
slang=en,eng         # Default language preference
blend-subtitles=yes  # Blend subtitles to screen resolution

# Subtitle Styling (Premium look)
sub-font="Inter Semibold"
sub-font-size=40
sub-color="#FFFFFFFF"
sub-border-color="#FF262626"
sub-border-size=2
sub-shadow-offset=1
sub-shadow-color="#33000000"
sub-spacing=0.5

# Volume & Audio
volume-max=150       # Allow volume up to 150%
alang=en,eng         # Audio language preference

# Cache Settings (Smoother playback)
cache=yes
demuxer-max-bytes=400MiB
demuxer-max-back-bytes=150MiB

# UI / OSD
osd-font="JetBrainsMono Nerd Font"
osd-font-size=30
osd-border-size=1

# Screenshots
screenshot-format=png
screenshot-high-bit-depth=yes
screenshot-directory="~/Pictures/Screenshots/"
screenshot-template="%F-%wH.%wM.%wS"
